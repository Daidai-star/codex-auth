name: Preview Release

on:
  pull_request:

permissions:
  contents: read

jobs:
  macos-preview:
    name: Build macOS Preview
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build CLI
        shell: bash
        run: PATH="$PWD/scripts:$PATH" zig build -Doptimize=ReleaseSafe

      - name: Build menu app
        shell: bash
        run: |
          BUILD_DIR="$RUNNER_TEMP/codex-auth-preview/build" \
          OUTPUT_DIR="$RUNNER_TEMP/codex-auth-preview/artifacts" \
          SCRATCH_PATH="$RUNNER_TEMP/codex-auth-preview/swift-build" \
          ARCHIVE_NAME="CodexAuthMenu-preview-${{ github.event.pull_request.number }}.zip" \
          ZIG_EXECUTABLE="$(command -v zig)" \
            bash apps/macos/CodexAuthMenu/Scripts/package-release-app.sh

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-preview
          path: ${{ runner.temp }}/codex-auth-preview/artifacts
