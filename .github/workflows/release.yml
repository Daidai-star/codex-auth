name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Zig test
        shell: bash
        run: |
          zig version
          zig env
          PATH="$PWD/scripts:$PATH" bash scripts/validate-zig.sh list

      - name: Build native binary
        shell: bash
        run: PATH="$PWD/scripts:$PATH" zig build -Doptimize=ReleaseSafe

  release-assets:
    name: Build Release Assets (${{ matrix.id }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: darwin-x64
            zig_target: x86_64-macos-none
            binary_name: codex-auth
            archive_name: codex-auth-macOS-X64.tar.gz
          - id: darwin-arm64
            zig_target: aarch64-macos-none
            binary_name: codex-auth
            archive_name: codex-auth-macOS-ARM64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check versions
        run: node scripts/npm/check-versions.mjs ${{ github.ref_name }}

      - name: Build binary
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseSafe

      - name: Stage artifact bundle
        shell: bash
        run: |
          mkdir -p "artifacts/${{ matrix.id }}/binary"
          cp "zig-out/bin/${{ matrix.binary_name }}" "artifacts/${{ matrix.id }}/binary/${{ matrix.binary_name }}"
          tar -czf "artifacts/${{ matrix.id }}/${{ matrix.archive_name }}" -C "artifacts/${{ matrix.id }}/binary" "${{ matrix.binary_name }}"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.id }}
          path: artifacts

  menu-app-assets:
    name: Build Menu App (${{ matrix.id }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: darwin-x64-app
            target_arch: x86_64
            target_triple: x86_64-apple-macosx14.0
            cli_zig_target: x86_64-macos
            archive_name: CodexAuthMenu-macOS-X64.zip
          - id: darwin-arm64-app
            target_arch: arm64
            target_triple: arm64-apple-macosx14.0
            cli_zig_target: aarch64-macos
            archive_name: CodexAuthMenu-macOS-ARM64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1

      - name: Build menu app archive
        shell: bash
        run: |
          BUILD_DIR="$RUNNER_TEMP/codex-auth-menu-app/${{ matrix.id }}/build" \
          OUTPUT_DIR="$RUNNER_TEMP/codex-auth-menu-app/${{ matrix.id }}/artifacts/${{ matrix.id }}" \
          SCRATCH_PATH="$RUNNER_TEMP/codex-auth-menu-app/${{ matrix.id }}/swift-build" \
          ARCHIVE_NAME="${{ matrix.archive_name }}" \
          TARGET_ARCH="${{ matrix.target_arch }}" \
          TARGET_TRIPLE="${{ matrix.target_triple }}" \
          CLI_ZIG_TARGET="${{ matrix.cli_zig_target }}" \
          ZIG_EXECUTABLE="$(command -v zig)" \
            bash apps/macos/CodexAuthMenu/Scripts/package-release-app.sh

      - name: Upload menu app archive
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.id }}
          path: ${{ runner.temp }}/codex-auth-menu-app/${{ matrix.id }}/artifacts

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-test, release-assets, menu-app-assets]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release notes
        uses: actions/github-script@v9
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        with:
          script: |
            const fs = require("fs");
            const cp = require("child_process");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const currentTag = process.env.CURRENT_TAG;

            function parseTag(tag) {
              const match = /^v(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/.exec(tag);
              if (!match) return null;
              return {
                tag,
                major: Number(match[1]),
                minor: Number(match[2]),
                patch: Number(match[3]),
                prerelease: match[4] ?? null,
              };
            }

            function compareIdentifiers(a, b) {
              const aIsNumeric = /^\d+$/.test(a);
              const bIsNumeric = /^\d+$/.test(b);
              if (aIsNumeric && bIsNumeric) {
                return Number(a) - Number(b);
              }
              if (aIsNumeric) return -1;
              if (bIsNumeric) return 1;
              return a.localeCompare(b);
            }

            function compareSemver(a, b) {
              if (a.major !== b.major) return a.major - b.major;
              if (a.minor !== b.minor) return a.minor - b.minor;
              if (a.patch !== b.patch) return a.patch - b.patch;
              if (a.prerelease == null && b.prerelease == null) return 0;
              if (a.prerelease == null) return 1;
              if (b.prerelease == null) return -1;

              const aParts = a.prerelease.split(".");
              const bParts = b.prerelease.split(".");
              const len = Math.max(aParts.length, bParts.length);
              for (let i = 0; i < len; i += 1) {
                const aPart = aParts[i];
                const bPart = bParts[i];
                if (aPart == null) return -1;
                if (bPart == null) return 1;
                const cmp = compareIdentifiers(aPart, bPart);
                if (cmp !== 0) return cmp;
              }
              return 0;
            }

            function choosePreviousTag(tags, current) {
              const olderTags = tags
                .filter((tag) => tag.tag !== current.tag)
                .filter((tag) => compareSemver(tag, current) < 0)
                .sort((a, b) => compareSemver(b, a));

              if (current.prerelease == null) {
                return olderTags.find((tag) => tag.prerelease == null)?.tag ?? null;
              }

              const sameCorePrerelease = olderTags.find(
                (tag) =>
                  tag.major === current.major &&
                  tag.minor === current.minor &&
                  tag.patch === current.patch &&
                  tag.prerelease != null,
              );
              if (sameCorePrerelease) return sameCorePrerelease.tag;

              return olderTags.find((tag) => tag.prerelease == null)?.tag ?? olderTags[0]?.tag ?? null;
            }

            const allTags = cp
              .execSync("git tag --sort=-version:refname", { encoding: "utf8" })
              .split("\n")
              .map((s) => s.trim())
              .filter(Boolean);

            const parsedTags = allTags.map(parseTag).filter(Boolean);
            const parsedCurrentTag = parseTag(currentTag);
            const previousTag = parsedCurrentTag
              ? choosePreviousTag(parsedTags, parsedCurrentTag)
              : allTags.find((t) => t !== currentTag) ?? null;

            let compareCommits = [];
            if (previousTag) {
              const compare = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${previousTag}...${currentTag}`,
              });
              compareCommits = compare.data.commits ?? [];
            } else {
              const commits = await github.rest.repos.listCommits({
                owner,
                repo,
                sha: currentTag,
                per_page: 100,
              });
              compareCommits = (commits.data ?? []).reverse();
            }

            const commitLines = compareCommits.map((commit) => {
              const shortSha = commit.sha.slice(0, 7);
              const msg = (commit.commit?.message ?? "").split("\n")[0].trim() || shortSha;
              return `- ${msg} (${shortSha})`;
            });

            const lines = [];
            lines.push("## Changelog");
            lines.push("");

            if (previousTag) {
              lines.push(`Full Changelog: <a href="https://github.com/${owner}/${repo}/compare/${previousTag}...${currentTag}"><code>${previousTag}...${currentTag}</code></a>`);
            } else {
              lines.push(`Full Changelog: <a href="https://github.com/${owner}/${repo}/commits/${currentTag}"><code>${currentTag}</code></a>`);
            }
            lines.push("");

            if (commitLines.length > 0) {
              lines.push(...commitLines);
            } else {
              lines.push("- No code changes detected.");
            }

            fs.writeFileSync("release-notes.md", lines.join("\n") + "\n");

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release-notes.md
          files: |
            release-assets/*/*.tar.gz
            release-assets/*/*.zip
